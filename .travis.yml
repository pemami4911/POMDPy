language: python
python:
  - "2.6"
  - "2.7"
  - "3.2"
  - "3.3"
  - "3.4"
  - "3.5"

addons:
  apt:
    packages:
      - libblas-dev
      - liblapack-dev
      - libatlas-base-dev
      - gfortran

install:
  - "pip install --user -r requirements.txt"
  - python setup.py install

script:
  - py.test test/unit_tests.py

